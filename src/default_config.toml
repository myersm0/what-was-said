[[doctype]]
name = "copilot_email"
source_pattern = "Copilot"
parser = "copilot_email"
merge_strategy = "positional"

[[doctype]]
name = "email"
source_pattern = "- (Outlook|Mail|Gmail)( - Brave)?$"
parser = "whole"
merge_strategy = "positional"
# Uncomment to use external preprocessor:
# preprocessor = "~/.config/cathedrals/parsers/email_parser.py"

[[doctype]]
name = "slack"
source_pattern = "(Channel|DM).*Slack( - Brave)?$"
parser = "whole"
merge_strategy = "positional"
# Uncomment to use external preprocessor:
# preprocessor = "~/.config/cathedrals/parsers/slack_parser.py"

[[doctype]]
name = "meeting_transcript"
source_pattern = "(Zoom|Teams Meeting|Google Meet)"
parser = "whole"
merge_strategy = "none"
# Uncomment to use external preprocessor:
# preprocessor = "~/.config/cathedrals/parsers/transcript_parser.py"

[[doctype]]
name = "claude"
source_pattern = "Claude( - Brave)?$"
parser = "markdown"
merge_strategy = "none"

[[doctype]]
name = "markdown"
extension = "md"
parser = "markdown"
merge_strategy = "none"
