# Tag configuration for commonplace
# Place this file at the same location as the database:
#   macOS: ~/Library/Application Support/commonplace/tags.toml
#   Linux: ~/.local/share/commonplace/tags.toml

# Default exclusions - these tags are filtered out unless you use --include-all
# or explicitly include them with --tags
[defaults]
exclude = ["junk", "archived"]

# Parent tags can include child tags. When you filter by a parent,
# documents tagged with any of its children will also be shown.
# This is one-directional: filtering by a child does NOT show parent.
#
# Example:
# [includes]
# project-maupassant = ["maupassant-parser", "maupassant-corpus", "maupassant-eval"]
# music = ["piano", "guitar", "drums"]
#
# With this config:
# - Filtering by "project-maupassant" finds docs tagged with it OR any sub-project
# - Filtering by "maupassant-parser" finds only docs tagged "maupassant-parser"

[includes]

# Tag colors - shown as colored dots (●) in the browse view.
# Available: red, green, blue, cyan, magenta, yellow, white, gray,
#            light_red, light_green, light_blue, light_cyan, light_magenta, light_yellow
#
# Example:
# [colors]
# research = "blue"
# project = "green"
# reference = "cyan"

[colors]
